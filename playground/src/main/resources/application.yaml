server:
  port: 3000

hotswap:
  agent:
    livereload:
      watch-base-dirs:
        - "playground"

spring:
  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 200MB
  devtools:
    livereload:
      enabled: true
    remote:
      restart:
        enabled: false
    restart:
      enabled: true
      poll-interval: 200ms
      quiet-period: 150ms
